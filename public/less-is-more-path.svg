<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdf4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ecfdf5;stop-opacity:1" />
    </linearGradient>
    <filter id="s3" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000020"/>
    </filter>
  </defs>
  <rect width="800" height="400" rx="16" fill="url(#bg3)" stroke="#d1fae5" stroke-width="1"/>
  <text x="400" y="38" text-anchor="middle" font-size="19" font-weight="700" fill="#065f46">从手动到自动：极简主义创业的进化路径</text>

  <!-- Step 1 -->
  <g filter="url(#s3)">
    <rect x="30" y="70" width="130" height="100" rx="12" fill="#fff" stroke="#fbbf24" stroke-width="2"/>
  </g>
  <text x="95" y="98" text-anchor="middle" font-size="28">💡</text>
  <text x="95" y="122" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">兴趣 &amp; 热情</text>
  <text x="95" y="140" text-anchor="middle" font-size="10" fill="#6b7280">不是技能</text>
  <text x="95" y="155" text-anchor="middle" font-size="10" fill="#6b7280">是你真正在乎的事</text>

  <!-- Arrow -->
  <polygon points="165,120 178,115 178,125" fill="#059669"/>
  <line x1="165" y1="120" x2="178" y2="120" stroke="#059669" stroke-width="2"/>

  <!-- Step 2 -->
  <g filter="url(#s3)">
    <rect x="185" y="70" width="130" height="100" rx="12" fill="#fff" stroke="#f97316" stroke-width="2"/>
  </g>
  <text x="250" y="98" text-anchor="middle" font-size="28">🤲</text>
  <text x="250" y="122" text-anchor="middle" font-size="13" font-weight="700" fill="#9a3412">手动帮人</text>
  <text x="250" y="140" text-anchor="middle" font-size="10" fill="#6b7280">别造任何东西</text>
  <text x="250" y="155" text-anchor="middle" font-size="10" fill="#6b7280">用手和时间服务客户</text>

  <!-- Arrow -->
  <polygon points="320,120 333,115 333,125" fill="#059669"/>
  <line x1="320" y1="120" x2="333" y2="120" stroke="#059669" stroke-width="2"/>

  <!-- Step 3 -->
  <g filter="url(#s3)">
    <rect x="340" y="70" width="130" height="100" rx="12" fill="#fff" stroke="#3b82f6" stroke-width="2"/>
  </g>
  <text x="405" y="98" text-anchor="middle" font-size="28">📋</text>
  <text x="405" y="122" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">记录流程</text>
  <text x="405" y="140" text-anchor="middle" font-size="10" fill="#6b7280">"有价值的人工流程"</text>
  <text x="405" y="155" text-anchor="middle" font-size="10" fill="#6b7280">MVP 的真正含义</text>

  <!-- Arrow -->
  <polygon points="475,120 488,115 488,125" fill="#059669"/>
  <line x1="475" y1="120" x2="488" y2="120" stroke="#059669" stroke-width="2"/>

  <!-- Step 4 -->
  <g filter="url(#s3)">
    <rect x="495" y="70" width="130" height="100" rx="12" fill="#fff" stroke="#8b5cf6" stroke-width="2"/>
  </g>
  <text x="560" y="98" text-anchor="middle" font-size="28">🔄</text>
  <text x="560" y="122" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6">验证 &amp; 迭代</text>
  <text x="560" y="140" text-anchor="middle" font-size="10" fill="#6b7280">反复帮人、反复改进</text>
  <text x="560" y="155" text-anchor="middle" font-size="10" fill="#6b7280">确认有人愿意付钱</text>

  <!-- Arrow -->
  <polygon points="630,120 643,115 643,125" fill="#059669"/>
  <line x1="630" y1="120" x2="643" y2="120" stroke="#059669" stroke-width="2"/>

  <!-- Step 5 -->
  <g filter="url(#s3)">
    <rect x="650" y="70" width="120" height="100" rx="12" fill="#059669"/>
  </g>
  <text x="710" y="98" text-anchor="middle" font-size="28">⚡</text>
  <text x="710" y="122" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">产品化</text>
  <text x="710" y="140" text-anchor="middle" font-size="10" fill="#d1fae5">流程变成产品</text>
  <text x="710" y="155" text-anchor="middle" font-size="10" fill="#d1fae5">自动化、规模化</text>

  <!-- Three paths section -->
  <text x="400" y="210" text-anchor="middle" font-size="16" font-weight="700" fill="#065f46">三种赚钱路径对比</text>

  <!-- Freelance -->
  <g filter="url(#s3)">
    <rect x="40" y="230" width="220" height="145" rx="12" fill="#fff" stroke="#a7f3d0" stroke-width="1.5"/>
  </g>
  <text x="150" y="258" text-anchor="middle" font-size="22">👤</text>
  <text x="150" y="280" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">自由职业</text>
  <text x="150" y="300" text-anchor="middle" font-size="11" fill="#6b7280">干一天赚一天</text>
  <text x="150" y="318" text-anchor="middle" font-size="11" fill="#059669" font-weight="600">✓ 马上有收入</text>
  <text x="150" y="336" text-anchor="middle" font-size="11" fill="#dc2626" font-weight="600">✗ 天花板低，停就没了</text>
  <rect x="60" y="348" width="180" height="18" rx="4" fill="#f0fdf4" stroke="#a7f3d0" stroke-width="1"/>
  <text x="150" y="361" text-anchor="middle" font-size="10" font-weight="600" fill="#059669">推荐起步阶段使用</text>

  <!-- Content -->
  <g filter="url(#s3)">
    <rect x="290" y="230" width="220" height="145" rx="12" fill="#fff" stroke="#a7f3d0" stroke-width="1.5"/>
  </g>
  <text x="400" y="258" text-anchor="middle" font-size="22">📚</text>
  <text x="400" y="280" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">书 / 课程 / 视频</text>
  <text x="400" y="300" text-anchor="middle" font-size="11" fill="#6b7280">做一次卖多次</text>
  <text x="400" y="318" text-anchor="middle" font-size="11" fill="#059669" font-weight="600">✓ 有爆发力</text>
  <text x="400" y="336" text-anchor="middle" font-size="11" fill="#dc2626" font-weight="600">✗ 一波一波不稳定</text>
  <rect x="310" y="348" width="180" height="18" rx="4" fill="#f0fdf4" stroke="#a7f3d0" stroke-width="1"/>
  <text x="400" y="361" text-anchor="middle" font-size="10" font-weight="600" fill="#059669">经验积累后进入</text>

  <!-- SaaS -->
  <g filter="url(#s3)">
    <rect x="540" y="230" width="220" height="145" rx="12" fill="#fff" stroke="#a7f3d0" stroke-width="1.5"/>
  </g>
  <text x="650" y="258" text-anchor="middle" font-size="22">💻</text>
  <text x="650" y="280" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">SaaS 软件</text>
  <text x="650" y="300" text-anchor="middle" font-size="11" fill="#6b7280">用户持续订阅付费</text>
  <text x="650" y="318" text-anchor="middle" font-size="11" fill="#059669" font-weight="600">✓ 天花板最高</text>
  <text x="650" y="336" text-anchor="middle" font-size="11" fill="#dc2626" font-weight="600">✗ 慢热，前期几乎不赚钱</text>
  <rect x="560" y="348" width="180" height="18" rx="4" fill="#f0fdf4" stroke="#a7f3d0" stroke-width="1"/>
  <text x="650" y="361" text-anchor="middle" font-size="10" font-weight="600" fill="#059669">流程验证后再考虑</text>

  <!-- Bottom -->
  <text x="400" y="395" text-anchor="middle" font-size="12" fill="#9ca3af" font-style="italic">"只创建你必须创建的东西，其余全部外包。越少越好，克制就是创意。"</text>
</svg>
