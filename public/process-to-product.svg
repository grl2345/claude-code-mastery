<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdf4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ecfdf5;stop-opacity:1" />
    </linearGradient>
    <filter id="s4" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000020"/>
    </filter>
    <marker id="ah" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 4 L 0 8 z" fill="#059669"/>
    </marker>
  </defs>
  <rect width="800" height="380" rx="16" fill="url(#bg4)" stroke="#d1fae5" stroke-width="1"/>
  <text x="400" y="36" text-anchor="middle" font-size="19" font-weight="700" fill="#065f46">流程打磨循环：从手动服务到规模化产品</text>

  <!-- Center cycle -->
  <!-- Step A: 手动服务 -->
  <g filter="url(#s4)">
    <rect x="280" y="60" width="140" height="70" rx="12" fill="#fff" stroke="#f97316" stroke-width="2"/>
  </g>
  <text x="350" y="88" text-anchor="middle" font-size="20">🤲</text>
  <text x="350" y="118" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412">手动帮客户做一遍</text>

  <!-- Arrow A -> B -->
  <line x1="420" y1="100" x2="470" y2="140" stroke="#059669" stroke-width="2" marker-end="url(#ah)"/>

  <!-- Step B: 反思 -->
  <g filter="url(#s4)">
    <rect x="470" y="140" width="140" height="70" rx="12" fill="#fff" stroke="#ef4444" stroke-width="2"/>
  </g>
  <text x="540" y="168" text-anchor="middle" font-size="20">🔍</text>
  <text x="540" y="198" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">发现问题，反思改进</text>

  <!-- Arrow B -> C -->
  <line x1="540" y1="210" x2="470" y2="250" stroke="#059669" stroke-width="2" marker-end="url(#ah)"/>

  <!-- Step C: 记录 -->
  <g filter="url(#s4)">
    <rect x="290" y="240" width="180" height="70" rx="12" fill="#fff" stroke="#3b82f6" stroke-width="2"/>
  </g>
  <text x="380" y="268" text-anchor="middle" font-size="20">📝</text>
  <text x="380" y="298" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">记录改进后的流程</text>

  <!-- Arrow C -> A (loop back) -->
  <path d="M 290 275 C 220 275, 220 95, 280 95" stroke="#059669" stroke-width="2" fill="none" marker-end="url(#ah)"/>

  <!-- Loop label -->
  <text x="200" y="185" text-anchor="middle" font-size="11" fill="#059669" font-weight="600">循环</text>
  <text x="200" y="200" text-anchor="middle" font-size="11" fill="#059669" font-weight="600">多轮</text>

  <!-- Break out arrow -->
  <line x1="470" y1="275" x2="570" y2="275" stroke="#059669" stroke-width="3" stroke-dasharray="8,4" marker-end="url(#ah)"/>

  <!-- Result: validated process -->
  <g filter="url(#s4)">
    <rect x="580" y="245" width="130" height="60" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  </g>
  <text x="645" y="270" text-anchor="middle" font-size="16">✨</text>
  <text x="645" y="292" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">验证过的流程</text>

  <!-- Arrow to productize -->
  <line x1="645" y1="305" x2="645" y2="325" stroke="#059669" stroke-width="3" marker-end="url(#ah)"/>

  <!-- Final: Product -->
  <g filter="url(#s4)">
    <rect x="580" y="328" width="130" height="40" rx="10" fill="#059669"/>
  </g>
  <text x="645" y="354" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">产品化 → 规模化</text>

  <!-- Left side: Gumroad example -->
  <text x="100" y="75" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">Gumroad 实例</text>

  <g filter="url(#s4)">
    <rect x="20" y="90" width="165" height="30" rx="6" fill="#fff" stroke="#fbbf24" stroke-width="1.5"/>
  </g>
  <text x="102" y="110" text-anchor="middle" font-size="10" fill="#6b7280">① 手动转账给每个卖家</text>

  <line x1="102" y1="120" x2="102" y2="130" stroke="#d1d5db" stroke-width="1"/>

  <g filter="url(#s4)">
    <rect x="20" y="132" width="165" height="30" rx="6" fill="#fff" stroke="#fb923c" stroke-width="1.5"/>
  </g>
  <text x="102" y="152" text-anchor="middle" font-size="10" fill="#6b7280">② 脚本自动下载付款列表</text>

  <line x1="102" y1="162" x2="102" y2="172" stroke="#d1d5db" stroke-width="1"/>

  <g filter="url(#s4)">
    <rect x="20" y="174" width="165" height="30" rx="6" fill="#fff" stroke="#f97316" stroke-width="1.5"/>
  </g>
  <text x="102" y="194" text-anchor="middle" font-size="10" fill="#6b7280">③ PayPal API 自动付款</text>

  <line x1="102" y1="204" x2="102" y2="214" stroke="#d1d5db" stroke-width="1"/>

  <g filter="url(#s4)">
    <rect x="20" y="216" width="165" height="30" rx="6" fill="#fff" stroke="#ea580c" stroke-width="1.5"/>
  </g>
  <text x="102" y="236" text-anchor="middle" font-size="10" fill="#6b7280">④ 所有环节全部自动化</text>

  <line x1="102" y1="246" x2="102" y2="256" stroke="#d1d5db" stroke-width="1"/>

  <g filter="url(#s4)">
    <rect x="20" y="258" width="165" height="30" rx="6" fill="#059669"/>
  </g>
  <text x="102" y="278" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">⑤ 一个人运营整个平台</text>

  <!-- Side label -->
  <text x="102" y="310" text-anchor="middle" font-size="10" fill="#9ca3af" font-style="italic">2700 行 Python → 上亿美元收入</text>

  <!-- Bottom quote -->
  <text x="400" y="370" text-anchor="middle" font-size="12" fill="#9ca3af" font-style="italic">"一个能帮人解决问题的烂产品，远好过一个完美但永远没做出来的好产品。"</text>
</svg>
