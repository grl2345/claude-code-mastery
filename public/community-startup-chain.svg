<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdf4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ecfdf5;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow2" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000020"/>
    </filter>
  </defs>
  <rect width="800" height="520" rx="16" fill="url(#bg2)" stroke="#d1fae5" stroke-width="1"/>
  <text x="400" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#065f46">极简主义创业的底层逻辑链</text>
  <text x="400" y="62" text-anchor="middle" font-size="13" fill="#6b7280">社区 → 问题 → 产品 → 企业</text>

  <!-- Community -->
  <g filter="url(#shadow2)">
    <circle cx="140" cy="160" r="65" fill="#fff" stroke="#059669" stroke-width="2.5"/>
  </g>
  <text x="140" y="140" text-anchor="middle" font-size="36">👥</text>
  <text x="140" y="170" text-anchor="middle" font-size="16" font-weight="700" fill="#065f46">社区</text>
  <text x="140" y="190" text-anchor="middle" font-size="11" fill="#6b7280">一群有共同需求的人</text>

  <!-- Arrow 1 -->
  <line x1="210" y1="160" x2="260" y2="160" stroke="#059669" stroke-width="2.5" stroke-dasharray="6,3"/>
  <polygon points="260,155 272,160 260,165" fill="#059669"/>
  <text x="240" y="148" text-anchor="middle" font-size="10" fill="#059669">观察</text>

  <!-- Problem (Lock) -->
  <g filter="url(#shadow2)">
    <rect x="275" y="105" width="120" height="110" rx="14" fill="#fff" stroke="#f59e0b" stroke-width="2.5"/>
  </g>
  <text x="335" y="142" text-anchor="middle" font-size="36">🔒</text>
  <text x="335" y="172" text-anchor="middle" font-size="16" font-weight="700" fill="#92400e">问题</text>
  <text x="335" y="192" text-anchor="middle" font-size="11" fill="#6b7280">反复出现的痛点</text>

  <!-- Arrow 2 -->
  <line x1="400" y1="160" x2="450" y2="160" stroke="#059669" stroke-width="2.5" stroke-dasharray="6,3"/>
  <polygon points="450,155 462,160 450,165" fill="#059669"/>
  <text x="430" y="148" text-anchor="middle" font-size="10" fill="#059669">创造</text>

  <!-- Product (Key) -->
  <g filter="url(#shadow2)">
    <rect x="465" y="105" width="120" height="110" rx="14" fill="#fff" stroke="#3b82f6" stroke-width="2.5"/>
  </g>
  <text x="525" y="142" text-anchor="middle" font-size="36">🔑</text>
  <text x="525" y="172" text-anchor="middle" font-size="16" font-weight="700" fill="#1e40af">产品</text>
  <text x="525" y="192" text-anchor="middle" font-size="11" fill="#6b7280">刚好解决痛点的方案</text>

  <!-- Arrow 3 -->
  <line x1="590" y1="160" x2="640" y2="160" stroke="#059669" stroke-width="2.5" stroke-dasharray="6,3"/>
  <polygon points="640,155 652,160 640,165" fill="#059669"/>
  <text x="620" y="148" text-anchor="middle" font-size="10" fill="#059669">验证</text>

  <!-- Business -->
  <g filter="url(#shadow2)">
    <rect x="655" y="100" width="110" height="120" rx="14" fill="#059669"/>
  </g>
  <text x="710" y="142" text-anchor="middle" font-size="36">💰</text>
  <text x="710" y="172" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">企业</text>
  <text x="710" y="192" text-anchor="middle" font-size="11" fill="#d1fae5">可持续盈利的生意</text>

  <!-- 1% Rule Pyramid -->
  <text x="220" y="280" text-anchor="middle" font-size="16" font-weight="700" fill="#065f46">社区参与的 1% 法则</text>

  <!-- 1% creators -->
  <polygon points="220,305 260,375 180,375" fill="#059669" stroke="#047857" stroke-width="1"/>
  <text x="220" y="350" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">1%</text>
  <text x="220" y="365" text-anchor="middle" font-size="9" fill="#d1fae5">创作</text>

  <!-- 9% contributors -->
  <polygon points="220,305 300,420 140,420" fill="none" stroke="#10b981" stroke-width="2"/>
  <rect x="140" y="378" width="160" height="40" fill="#d1fae5" rx="0"/>
  <polygon points="180,375 260,375 300,420 140,420" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="220" y="400" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">9% 贡献</text>
  <text x="220" y="414" text-anchor="middle" font-size="9" fill="#047857">评论、点赞、讨论</text>

  <!-- 90% lurkers -->
  <polygon points="140" fill="none"/>
  <polygon points="140,420 300,420 340,470 100,470" fill="#f0fdf4" stroke="#a7f3d0" stroke-width="1"/>
  <text x="220" y="450" text-anchor="middle" font-size="11" font-weight="600" fill="#6b7280">90% 潜水</text>
  <text x="220" y="464" text-anchor="middle" font-size="9" fill="#9ca3af">默默浏览、消费内容</text>

  <!-- Labels -->
  <text x="350" y="345" font-size="11" fill="#059669" font-weight="600">← 90倍影响力</text>
  <text x="350" y="398" font-size="11" fill="#10b981" font-weight="600">← 10倍曝光</text>
  <text x="350" y="452" font-size="11" fill="#9ca3af">← 基准线</text>

  <!-- Four Value Types -->
  <text x="600" y="280" text-anchor="middle" font-size="16" font-weight="700" fill="#065f46">四种价值创造方式</text>

  <g filter="url(#shadow2)">
    <rect x="480" y="300" width="110" height="70" rx="10" fill="#fff" stroke="#a7f3d0" stroke-width="1.5"/>
  </g>
  <text x="535" y="326" text-anchor="middle" font-size="22">📍</text>
  <text x="535" y="346" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">地理位置价值</text>
  <text x="535" y="361" text-anchor="middle" font-size="10" fill="#6b7280">让远的变近</text>

  <g filter="url(#shadow2)">
    <rect x="600" y="300" width="110" height="70" rx="10" fill="#fff" stroke="#a7f3d0" stroke-width="1.5"/>
  </g>
  <text x="655" y="326" text-anchor="middle" font-size="22">🔄</text>
  <text x="655" y="346" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">形式价值</text>
  <text x="655" y="361" text-anchor="middle" font-size="10" fill="#6b7280">重新组合信息</text>

  <g filter="url(#shadow2)">
    <rect x="480" y="385" width="110" height="70" rx="10" fill="#fff" stroke="#a7f3d0" stroke-width="1.5"/>
  </g>
  <text x="535" y="411" text-anchor="middle" font-size="22">⏱️</text>
  <text x="535" y="431" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">时间价值</text>
  <text x="535" y="446" text-anchor="middle" font-size="10" fill="#6b7280">让慢的变快</text>

  <g filter="url(#shadow2)">
    <rect x="600" y="385" width="110" height="70" rx="10" fill="#fff" stroke="#a7f3d0" stroke-width="1.5"/>
  </g>
  <text x="655" y="411" text-anchor="middle" font-size="22">🤝</text>
  <text x="655" y="431" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">所有权价值</text>
  <text x="655" y="446" text-anchor="middle" font-size="10" fill="#6b7280">移除中间商</text>

  <!-- Bottom quote -->
  <text x="400" y="502" text-anchor="middle" font-size="12" fill="#9ca3af" font-style="italic">"是社区将你引向问题，问题将你引向产品，产品为你带来生意。" —— 萨希尔·拉文吉亚</text>
</svg>
