<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 440" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <defs>
    <linearGradient id="bgGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fefcf7"/>
      <stop offset="100%" stop-color="#f6f1e6"/>
    </linearGradient>
    <filter id="shadowGold" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000015"/>
    </filter>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d97706"/>
    </marker>
  </defs>

  <rect width="860" height="440" rx="16" fill="url(#bgGold)" stroke="#e9e2d2" stroke-width="1"/>
  <text x="430" y="40" text-anchor="middle" font-size="19" font-weight="700" fill="#2b2b2b">彩蛋金矿：alternative 词</text>
  <text x="430" y="62" text-anchor="middle" font-size="12" fill="#7a7a7a">一个词就能把意图从 N 翻转成 C，让你合法蹭大品牌流量</text>

  <!-- Left column: keyword variants -->
  <text x="200" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#9a8d73">关键词变体</text>

  <g filter="url(#shadowGold)">
    <rect x="60" y="120" width="280" height="52" rx="10" fill="#fff" stroke="#e8d5d5" stroke-width="1"/>
  </g>
  <text x="80" y="151" font-size="13" fill="#2b2b2b" font-family="ui-monospace, 'SF Mono', monospace">chatgpt</text>
  <rect x="290" y="136" width="40" height="20" rx="10" fill="#fef2f2"/>
  <text x="310" y="150" text-anchor="middle" font-size="11" font-weight="700" fill="#b91c1c">N</text>

  <g filter="url(#shadowGold)">
    <rect x="60" y="180" width="280" height="52" rx="10" fill="#fff" stroke="#e8d5d5" stroke-width="1"/>
  </g>
  <text x="80" y="211" font-size="13" fill="#2b2b2b" font-family="ui-monospace, 'SF Mono', monospace">chatgpt login</text>
  <rect x="290" y="196" width="40" height="20" rx="10" fill="#fef2f2"/>
  <text x="310" y="210" text-anchor="middle" font-size="11" font-weight="700" fill="#b91c1c">N</text>

  <g filter="url(#shadowGold)">
    <rect x="60" y="240" width="280" height="52" rx="10" fill="#fff" stroke="#e8d5d5" stroke-width="1"/>
  </g>
  <text x="80" y="271" font-size="13" fill="#2b2b2b" font-family="ui-monospace, 'SF Mono', monospace">chatgpt pricing</text>
  <rect x="290" y="256" width="40" height="20" rx="10" fill="#fef2f2"/>
  <text x="310" y="270" text-anchor="middle" font-size="11" font-weight="700" fill="#b91c1c">N</text>

  <g filter="url(#shadowGold)">
    <rect x="60" y="300" width="280" height="62" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
  </g>
  <text x="80" y="336" font-size="13" font-weight="700" fill="#92400e" font-family="ui-monospace, 'SF Mono', monospace">chatgpt alternative</text>
  <rect x="290" y="321" width="40" height="20" rx="10" fill="#dcfce7"/>
  <text x="310" y="335" text-anchor="middle" font-size="11" font-weight="700" fill="#15803d">C</text>
  <text x="80" y="354" font-size="10" fill="#9a3412">↑ alternative 彻底改变意图</text>

  <!-- Arrow to the right -->
  <line x1="360" y1="331" x2="440" y2="331" stroke="#d97706" stroke-width="2.5" marker-end="url(#arrowGold)"/>

  <!-- Right column: standard playbook -->
  <text x="660" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#9a8d73">标准打法</text>

  <g filter="url(#shadowGold)">
    <rect x="460" y="120" width="340" height="260" rx="12" fill="#fff" stroke="#fcd34d" stroke-width="1.5"/>
  </g>
  <rect x="460" y="120" width="340" height="46" rx="12" fill="#fffbeb"/>
  <text x="630" y="150" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">做一篇对比文章</text>

  <text x="480" y="190" font-size="12" fill="#4b5563">标题示例：</text>
  <rect x="480" y="200" width="300" height="30" rx="6" fill="#fef3c7"/>
  <text x="492" y="221" font-size="12" font-weight="600" fill="#78350f">Best ChatGPT Alternatives in 2026</text>

  <rect x="480" y="236" width="300" height="30" rx="6" fill="#fef3c7"/>
  <text x="492" y="257" font-size="12" font-weight="600" fill="#78350f">10 Free Alternatives to ChatGPT</text>

  <line x1="480" y1="282" x2="780" y2="282" stroke="#fde68a" stroke-width="1"/>

  <text x="480" y="306" font-size="12" font-weight="700" fill="#2b2b2b">为什么是金矿？</text>
  <text x="480" y="326" font-size="11" fill="#6b7280">· 用户对现有方案不满意，主动找替代品</text>
  <text x="480" y="344" font-size="11" fill="#6b7280">· 付费意愿 &amp; 转化意愿双高</text>
  <text x="480" y="362" font-size="11" fill="#6b7280">· 合法蹭 ChatGPT 的庞大搜索量</text>
</svg>
